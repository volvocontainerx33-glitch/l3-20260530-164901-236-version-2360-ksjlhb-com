  <script>
  fetch('assets/catalog.json').then(r => r.json()).then(data => {
    const input = document.querySelector('[data-search-box]');
    const out = document.querySelector('[data-search-results]');
    const count = document.querySelector('[data-search-count]');
    const region = document.querySelector('[data-search-region]');
    const year = document.querySelector('[data-search-year]');
    const render = () => {
      const q = (input.value || '').trim().toLowerCase();
      const reg = region.value;
      const yr = year.value;
      const filtered = data.filter(m => {
        const txt = [m.title,m.region,m.type,m.genre,m.category_name,(m.tags||[]).join(' ')].join(' ').toLowerCase();
        if (q && !txt.includes(q)) return false;
        if (reg && m.region !== reg) return false;
        if (yr && String(m.year) !== yr) return false;
        return true;
      });
      count.textContent = filtered.length;
      out.innerHTML = filtered.slice(0, 240).map(m => `
        <a class="card" href="${m.file}">
          <div class="poster"><img src="${m.poster || ''}" alt="${m.title}"></div>
          <div class="card-body">
            <h3>${m.title}</h3>
            <div class="sub">${m.region} · ${m.genre} · ${m.year}</div>
            <div class="tag-row">${(m.tags||[]).slice(0,3).map(t => `<span class="tag">${t}</span>`).join('')}</div>
          </div>
        </a>`).join('');
    };
    const uniqueRegions = [...new Set(data.map(d => d.region))].sort();
    region.innerHTML = '<option value="">全部地区</option>' + uniqueRegions.map(r => `<option value="${r}">${r}</option>`).join('');
    const uniqueYears = [...new Set(data.map(d => d.year))].filter(Boolean).sort((a,b)=>b-a);
    year.innerHTML = '<option value="">全部年份</option>' + uniqueYears.slice(0,40).map(y => `<option value="${y}">${y}</option>`).join('');
    input.addEventListener('input', render);
    region.addEventListener('change', render);
    year.addEventListener('change', render);
    render();
  });
  </script>
